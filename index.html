<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="./img/hero_loop.mp4 as="video" />
    <title>New teb</title>

    <style>
        html {
                background-color: #efeff4;
            }

            * {
                box-sizing: border-box;
                font-family: "Lexend", sans-serif;
                font-optical-sizing: auto;
                
            }

            ::selection,
            ::-webkit-selection {
                background-color: rgba(0, 0, 0, 0.15);
            }

        #opened {
                width: 100%;
                min-height: 100vh;
                margin: 0;
                padding: 0 16px;
         }

        #bg,
        #overlay {
                position: fixed;
                z-index: -2;
                bottom: 1px;
                left: 0;
                width: 100%;
                min-height: 100vh;
            }

        #bg {
                object-fit: center;
                object-position: center;
            }

        #overlay {
                z-index: -1;
                background: radial-gradient(
                    circle,
                    rgba(0, 0, 0, 0.1875) 0%,
                    rgba(0, 0, 0, 0) 50%
                );
            }
        #app {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-self: center;
                width: 100%;
                max-width: 620px;
                min-height: 100vh;
                margin: 0 auto;
                padding: 16px 0 52px 0;
            }

        #time {
                z-index: 0;
                top: calc(50vh - 200px - 100px);
                left: 300px;
                margin: 0;
                position: absolute;
                width: 100%;
                text-align: center;
                font-size: 120px;
                /* font-variant-numeric: tabular-nums; */
                font-weight: 600;
                opacity: 0.9;
                color: #fff;
                user-select: none;
                -webkit-user-drag: none;
                pointer-events: none;
                /* text-shadow: 0 8px 32px rgba(255, 255, 255, 0.375);
                text-shadow: 1px 1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000,
                    -1px -1px 0 #000; */
            }

    </style> 

</head>
<body id = "open">
    <div id = "overlay">
        <video id = "bg" autoplay muted loop>
        <source src="./img/hero_loop.mp4" />
        </video>
        
        <main id = "app">
            <h1 id = time>
                <span id ="hour">00</span>:<span id = "minute">00</span>
            </h1>
        </main>
    </div>
    
    
    
</body>
</html>
