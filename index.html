<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="./img/hero_loop.mp4 as="video" />
    <title>New teb</title>

    <style>
        html {
                background-color: #efeff4;
            }

            * {
                box-sizing: border-box;
                font-family: "Lexend", sans-serif;
                font-optical-sizing: auto;
                
            }

            ::selection,
            ::-webkit-selection {
                background-color: rgba(0, 0, 0, 0.15);
            }

        #opened {
                width: 100%;
                min-height: 100vh;
                margin: 0;
                padding: 0 16px;
         }

        #bg,
        #overlay {
                position: fixed;
                z-index: -2;
                bottom: 0px;
                left: 0;
                width: 100%;
                min-height: 100vh;
            }

        #bg {
                object-fit: center;
                object-position: center;
            }

        #overlay {
                z-index: -1;
                background: radial-gradient(
                    circle,
                    rgba(0, 0, 0, 0.1875) 0%,
                    rgba(0, 0, 0, 0) 50%
                );
            }
        #app {
                position: relative;
                width: 100%;
                max-width: 620px;
                min-height: 100vh;
                margin: 0 auto;
                padding: 16px 0 52px 0;
            }

        #time {
                z-index: 0;
                position: absolute;
                top: 80px;
                right: 40px;
                margin: 0;
                font-size: 120px;
                font-weight: 600;
                opacity: 0.9;
                color: #fff;
                user-select: none;
                -webkit-user-drag: none;
                pointer-events: none;
                white-space: nowrap;
                text-shadow:
                    0 0 12px rgba(0, 217, 255, 0.65),
                    1px 1px 0 #00D9FF,
                    -1px 1px 0 #00D9FF,
                    1px -1px 0 #00D9FF,
                    -1px -1px 0 #00D9FF;
            }
        #date {
                z-index: 0;
                position: static;
                transform: rotate(-90deg);
                transform-origin: center;
                margin: 0;
                width: auto;
                white-space: nowrap;
                font-size: 80px;
                font-weight: 1100;
                opacity: 0.9;
                color: #000000;
                user-select: none;
                -webkit-user-drag: none;
                pointer-events: none;
                text-shadow:
                    1px 1px 0 #fe0b0b,
                    -1px 1px 0 #FE0B0B,
                    1px -1px 0 #FE0B0B,
                    -1px -1px 0 #FE0B0B;
            }

        .social-media {
                position: absolute;
                top: 300px;
                right: 50px;
                display: flex;
                flex-direction: column;
                gap: 40px;
                align-items: flex-start;
                z-index: 1;
            }

        #date-container {
                position: fixed;
                left: -230px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;
            }

        

        .instagram,
        .youtube,
        .google {
                position: relative;
                font-size: 80px;
                font-weight: 1000;
                color: #fff;
                text-align: left;
                cursor: pointer;
                margin: 0;
                white-space: nowrap;
                text-decoration: none;
                display: block;
                transform-origin: left center;
                transition: transform 0.35s ease, text-shadow 0.35s ease, color 0.35s ease;
                text-shadow:
                    0 0 10px rgba(0, 217, 255, 0.55),
                    1px 1px 0 #00D9FF,
                    -1px 1px 0 #00D9FF,
                    1px -1px 0 #00D9FF,
                    -1px -1px 0 #00D9FF;
            }

        .instagram:hover,
        .youtube:hover,
        .google:hover {
                transform: scale(1.12);
                color: #000;
                text-shadow:
                    1px 1px 0 #FE0B0B,
                    -1px 1px 0 #FE0B0B,
                    1px -1px 0 #FE0B0B,
                    -1px -1px 0 #FE0B0B;
            }

        .instagram:hover::before,
        .youtube:hover::before,
        .google:hover::before {
                content: '';
                position: absolute;
                left: -30px;
                top: 50%;
                transform: translateY(-50%) rotate(45deg);
                width: 14px;
                height: 14px;
                background: #FE0B0B;
            }

    </style> 

</head>
<body id = "open">
    <div id = "overlay">
        <video id = "bg" autoplay muted loop>
        <source src="./img/hero_loop.mp4" />
        </video>
        
        <main id = "app">
            <h1 id = time>
                <span id ="hour">00</span>:<span id = "minute">00</span>
            </h1>

            <div class="social-media">
                <a href="https://instagram.com" target="_blank" class="instagram">Instagram</a>
                <a href="https://youtube.com" target="_blank" class="youtube">Youtube</a>
                <a href="https://google.com" target="_blank" class="google">Google</a>
            </div>
        </main>

        <div id="date-container">
            <h1 id = date>
                <span id = "day">monday</span>
                <span id = "number">00</span>
                <span id = "month">january</span>
            </h1>
        </div>
    </div>

    <script src="https://unpkg.com/dayjs@1.11.9/dayjs.min.js"></script>
    <script>
        const hourEl = document.getElementById('hour');
        const minuteEl = document.getElementById('minute');
        const dayEl = document.getElementById('day');
        const numberEl = document.getElementById('number');
        const monthEl = document.getElementById('month');

        function updateDateTime() {
            const now = dayjs();
            hourEl.textContent = now.format('HH');
            minuteEl.textContent = now.format('mm');
            dayEl.textContent = now.format('dddd').toLowerCase();
            numberEl.textContent = now.format('DD');
            monthEl.textContent = now.format('MMMM').toLowerCase();
        }

        updateDateTime();
        setInterval(updateDateTime, 1000 * 60);
    </script>
</body>
</html>
